is bonus lasts until your next rest.", "cost": "Spend 3 Hope", "uses": null, "passive": false}, {"name": "Cloaked", "text": "Any time you would be Hidden, you are instead Cloaked. In addition to the benefits of the Hidden condition, while Cloaked you remain unseen if you are stationary when an adversary moves to where they would normally see you. After you make an attack or end a move within line of sight of an adversary, you are no longer Cloaked.", "cost": "", "uses": null, "passive": true}, {"name": "Sneak Attack", "text": "When you succeed on an attack while Cloaked or while an ally is within Melee range of your target, add a number of d6s equal to your tier to your damage roll. \n• Level 1 -> Tier 1\n\n• Levels 2–4 -> Tier 2 \n\n• Levels 5–7 -> Tier 3 \n\n• Levels 8–10 -> Tier 4", "cost": "", "uses": null, "passive": true}, {"name": "Well-Connected", "text": "When you arrive in a prominent town or environment, you know somebody who calls this place home. Give them a name, note how you think they could be useful, and choose one fact from the following list: \n• They owe me a favor, but they’ll be hard to find.\n\n• They’re going to ask for something in exchange. \n\n• They’re always in a great deal of trouble. \n\n• We used to be together. It’s a long story. \n\n• We didn’t part on great terms.", "cost": "", "uses": null, "passive": true}, {"name": "Contacts Everywhere", "text": "Once per session, you can briefly call on a shady contact. Choose one of the following benefits and describe what brought them here to help you in this moment: \n• They provide 1 handful of gold, a unique tool, or a mundane object that the situation requires.\n\n• On your next action roll, their help provides a +3 bonus to the result of your Hope or Fear Die. \n\n• The next time you deal damage, they snipe from the shadows, adding 2d8 to your damage roll.", "cost": "Mark 1 HP", "uses": {"n": 1, "period": "session"}, "passive": false}, {"name": "Reliable Backup", "text": "You can use your “Contacts Everywhere” feature three times per session. The following options are added to the list of benefits you can choose from when you use that feature: \n• When you mark 1 or more Hit Points, they can rush out to shield you, reducing the Hit Points marked by 1.\n\n• When you make a Presence Roll in conversation, they back you up. You can roll a d20 as your Hope Die.", "cost": "", "uses": {"n": 3, "period": "session"}, "passive": false}, {"name": "First??? Scar", "text": "", "cost": "", "uses": null, "passive": true}], "inventory": [{"name": "Set of Forgery Tools", "kind": "loot", "qty": 1, "text": ""}, {"name": "50ft of Rope", "kind": "loot", "qty": 1, "text": ""}, {"name": "Basic Supplies", "kind": "loot", "qty": 1, "text": ""}, {"name": "Torch", "kind": "loot", "qty": 1, "text": ""}, {"name": "Phase Vambraces", "kind": "loot", "qty": 1, "text": ""}, {"name": "Vial of Darksmoke Recipe", "kind": "loot", "qty": 1, "text": "As a downtime move, you can mark a Stress to craft a Vial of Darksmoke."}, {"name": "Minor Health Potion", "kind": "consumable", "qty": 1, "text": "Clear 1d4 HP."}, {"name": "Minor Health Potion", "kind": "consumable", "qty": 1, "text": "Clear 1d4 HP."}, {"name": "Replication Parchment", "kind": "consumable", "qty": 1, "text": "By touching this piece of parchment to another, you can perfectly copy the second parchment’s contents. Once used, this parchment becomes mundane paper."}, {"name": "Vial of Darksmoke", "kind": "consumable", "qty": 1, "text": "When an adversary attacks you, use this vial and roll a number of d6s equal to your Agility. Add the highest result to your Evasion against the attack."}], "gold": {"coins": 0, "handfuls": 2, "bags": 0, "chests": 0}, "id": "heyou", "portrait": "https://foundry.sortilege.online/sortilege/enduring-lesser-lights/portraits/Heyou_2A__Scarf.png"};</script>
