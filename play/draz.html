pe": ["physical"], "feature": ""}], "cards": [{"name": "Nature’s Tongue", "domain": "sage", "level": 1, "recallCost": 0, "type": "ability", "inVault": false, "text": "You can speak the language of the natural world. When you want to speak to the plants and animals around you, make an Instinct Roll (12). On a success, they’ll give you the information they know. On a roll with Fear, their knowledge might be limited or come at a cost.\nAdditionally, before you make a Spellcast Roll while within a natural environment, you can spend a Hope to gain a +2 bonus to the roll.", "spells": []}, {"name": "Wall Walk", "domain": "arcana", "level": 1, "recallCost": 1, "type": "spell", "inVault": false, "text": "Spend a Hope to allow a creature you can touch to climb on walls and ceilings as easily as walking on the ground. This lasts until the end of the scene or you cast Wall Walk again.", "spells": []}, {"name": "Conjure Swarm", "domain": "sage", "level": 2, "recallCost": 1, "type": "spell", "inVault": false, "text": "Tekaira Armored Beetles: Mark a Stress to conjure armored beetles that encircle you. When you next take damage, reduce the severity by one threshold. You can spend a Hope to keep the beetles conjured after taking damage.\nFire Flies: Make a Spellcast Roll against all adversaries within Close range. Spend a Hope to deal 2d8+3 magic damage to targets you succeeded against.", "spells": []}, {"name": "Boost", "domain": "bone", "level": 4, "recallCost": 1, "type": "ability", "inVault": false, "text": "Mark a Stress to boost off a willing ally within Close range, fling yourself into the air, and perform an aerial attack against a target within Far range. You have advantage on the attack, add a d10 to the damage roll, and end your move within Melee range of the target.", "spells": []}, {"name": "Healing Field", "domain": "sage", "level": 4, "recallCost": 2, "type": "spell", "inVault": false, "text": "Once per long rest, you can conjure a field of healing plants around you. Everywhere within Close range of you bursts to life with vibrant nature, allowing you and all allies in the area to clear a Hit Point.\nSpend 2 Hope to allow you and all allies to clear 2 Hit Points instead.", "spells": []}, {"name": "Gifted Tracker", "domain": "sage", "level": 1, "recallCost": 0, "type": "ability", "inVault": true, "text": "When you’re tracking a specific creature or group of creatures based on signs of their passage, you can spend any number of Hope and ask the GM that many questions from the following list.\nWhat direction did they go?\nHow long ago did they pass through?\nWhat were they doing in this location?\nHow many of them were here?\nWhen you encounter creatures you’ve tracked in this way, gain a +1 bonus to your Evasion against them.", "spells": []}, {"name": "Brace", "domain": "bone", "level": 3, "recallCost": 1, "type": "ability", "inVault": true, "text": "When you mark an Armor Slot to reduce incoming damage, you can mark a Stress to mark an additional Armor Slot.", "spells": []}], "features": [{"name": "Natural Climber", "text": "You have advantage on Agility Rolls that involve balancing and climbing.", "cost": "", "uses": null, "passive": true}, {"name": "Nimble", "text": "Gain a permanent +1 bonus to your Evasion at character creation.", "cost": "", "uses": null, "passive": true}, {"name": "Lightfoot", "text": "Your movement is naturally silent. You have advantage on rolls to move without being heard.", "cost": "", "uses": null, "passive": true}, {"name": "Hold Them Off", "text": "Spend 3 Hope when you succeed on an attack with a weapon to use that same roll against two additional adversaries within range of the attack.", "cost": "Spend 3 Hope", "uses": null, "passive": false}, {"name": "Ranger's Focus", "text": "Spend a Hope and make an attack against a target. On a success, deal your attack’s normal damage and temporarily make the attack’s target your Focus. Until this feature ends or you make a different creature your Focus, you gain the following benefits against your Focus: \n• You know precisely what direction they are in. \n\n• When you deal damage to them, they must mark a Stress. \n\n• When you fail an attack against them, you can end your Ranger’s Focus feature to reroll your Duality Dice.", "cost": "Spend 1 Hope", "uses": null, "passive": false}, {"name": "Ruthless Predator", "text": "When you make a damage roll, you can mark a Stress to gain a +1 bonus to your Proficiency. Additionally, when you deal Severe damage to an adversary, they must mark a Stress.", "cost": "Mark 1 Stress", "uses": null, "passive": false}, {"name": "Path Forward", "text": "When you’re traveling to a place you’ve previously visited or you carry an object that has been at the location before, you can identify the shortest, most direct path to your destination.", "cost": "", "uses": null, "passive": true}, {"name": "Elusive Predator", "text": "When your Focus makes an attack against you, you gain a +2 bonus to your Evasion against the attack.", "cost": "", "uses": null, "passive": true}, {"name": "Apex Predator", "text": "Before you make an attack roll against your Focus, you can spend a Hope. On a successful attack, you remove a Fear from the GM’s Fear pool.", "cost": "Spend 1 Hope", "uses": null, "passive": false}, {"name": "Beastform", "text": "Mark a Stress to magically transform into a creature of your tier or lower from the Beastform list. You can drop out of this form at any time. While transformed, you can’t use weapons or cast spells from domain cards, but you can still use other features or abilities you have access to. Spells you cast before you transform stay active and last for their normal duration, and you can talk and communicate as normal. Additionally, you gain the Beastform’s features, add their Evasion bonus to your Evasion, and use the trait specified in their statistics for your attack. While you’re in a Beastform, your armor becomes part of your body and you mark Armor Slots as usual; when you drop out of a Beastform, those marked Armor Slots remain marked. If you mark your last Hit Point, you automatically drop out of this form.", "cost": "Mark 1 Stress", "uses": null, "passive": false}, {"name": "Wildtouch", "text": "You can perform harmless, subtle effects that involve nature—such as causing a flower to rapidly grow, summoning a slight gust of wind, or starting a campfire— at will.", "cost": "", "uses": null, "passive": true}, {"name": "Elemental Incarnation", "text": "Mark a Stress to Channel one of the following elements until you take Severe damage or until your next rest:\n• Fire: When an adversary within Melee range deals damage to you, they take 1d10 magic damage.\n\n• Earth: Gain a bonus to your damage thresholds equal to your Proficiency.\n\n• Water: When you deal damage to an adversary within Melee range, all other adversaries within Very Close range must mark a Stress. \n\n• Air: You can hover, gaining advantage on Agility Rolls.", "cost": "Mark 1 Stress", "uses": null, "passive": false}, {"name": "Elemental Aura", "text": "Once per rest while Channeling, you can assume an aura matching your element. The aura affects targets within Close range until your Channeling ends.\n• Fire: When an adversary marks 1 or more Hit Points, they must also mark a Stress.\n\n• Earth: Your allies gain a +1 bonus to Strength.\n\n• Water: When an adversary deals damage to you, you can mark a Stress to move them anywhere within Very Close range of where they are.\n\n• Air: When you or an ally takes damage from an attack beyond Melee range, reduce the damage by 1d8.", "cost": "", "uses": {"n": 1, "period": "rest"}, "passive": false}, {"name": "Elemental Dominion", "text": "You further embody your element. While Channeling, you gain the following benefit:\n• Fire: You gain a +1 bonus to your Proficiency for attacks and spells that deal damage.\n\n• Earth: When you would mark Hit Points, roll a d6 per Hit Point marked. For each result of 6, reduce the number of Hit Points you mark by 1.\n\n• Water: When an attack against you succeeds, you can mark a Stress to make the attacker temporarily Vulnerable.\n\n• Air: You gain a +1 bonus to your Evasion and can fly", "cost": "Mark 1 Stress", "uses": null, "passive": false}], "inventory": [{"name": "Broken Compass", "kind": "loot", "qty": 1, "text": ""}, {"name": "50ft of Rope", "kind": "loot", "qty": 1, "text": ""}, {"name": "Basic Supplies", "kind": "loot", "qty": 1, "text": ""}, {"name": "Torch", "kind": "loot", "qty": 1, "text": ""}, {"name": "a small twig form the tree", "kind": "loot", "qty": 1, "text": "a small twig from the \"special branch\" tree"}, {"name": "Piercing Arrows", "kind": "loot", "qty": 1, "text": "Three times per rest when you succeed on an attack with one of these arrows, you can add your Proficiency to the damage roll."}, {"name": "Minor Health Potion", "kind": "consumable", "qty": 1, "text": "Clear 1d4 HP."}, {"name": "Unstable Arcane Shard", "kind": "consumable", "qty": 1, "text": "You can make a Finesse Roll to throw this shard at a group of adversaries within Far range. Targets you succeed against take 1d20 magic damage."}], "gold": {"coins": 0, "handfuls": 2, "bags": 0, "chests": 0}, "id": "draz", "portrait": "https://foundry.sortilege.online/sortilege/enduring-lesser-lights/portraits/draz.jpg"};</script>
