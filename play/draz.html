pe": ["physical"], "feature": ""}], "cards": [{"name": "Nature’s Tongue", "domain": "sage", "level": 1, "recallCost": 0, "type": "ability", "inVault": false, "text": "You can speak the language of the natural world. When you want to speak to the plants and animals around you, make an Instinct Roll (12). On a success, they’ll give you the information they know. On a roll with Fear, their knowledge might be limited or come at a cost.\nAdditionally, before you make a Spellcast Roll while within a natural environment, you can spend a Hope to gain a +2 bonus to the roll.", "spells": []}, {"name": "Wall Walk", "domain": "arcana", "level": 1, "recallCost": 1, "type": "spell", "inVault": false, "text": "Spend a Hope to allow a creature you can touch to climb on walls and ceilings as easily as walking on the ground. This lasts until the end of the scene or you cast Wall Walk again.", "spells": []}, {"name": "Conjure Swarm", "domain": "sage", "level": 2, "recallCost": 1, "type": "spell", "inVault": false, "text": "Tekaira Armored Beetles: Mark a Stress to conjure armored beetles that encircle you. When you next take damage, reduce the severity by one threshold. You can spend a Hope to keep the beetles conjured after taking damage.\nFire Flies: Make a Spellcast Roll against all adversaries within Close range. Spend a Hope to deal 2d8+3 magic damage to targets you succeeded against.", "spells": []}, {"name": "Boost", "domain": "bone", "level": 4, "recallCost": 1, "type": "ability", "inVault": false, "text": "Mark a Stress to boost off a willing ally within Close range, fling yourself into the air, and perform an aerial attack against a target within Far range. You have advantage on the attack, add a d10 to the damage roll, and end your move within Melee range of the target.", "spells": []}, {"name": "Healing Field", "domain": "sage", "level": 4, "recallCost": 2, "type": "spell", "inVault": false, "text": "Once per long rest, you can conjure a field of healing plants around you. Everywhere within Close range of you bursts to life with vibrant nature, allowing you and all allies in the area to clear a Hit Point.\nSpend 2 Hope to allow you and all allies to clear 2 Hit Points instead.", "spells": []}, {"name": "Gifted Tracker", "domain": "sage", "level": 1, "recallCost": 0, "type": "ability", "inVault": true, "text": "When you’re tracking a specific creature or group of creatures based on signs of their passage, you can spend any number of Hope and ask the GM that many questions from the following list.\nWhat direction did they go?\nHow long ago did they pass through?\nWhat were they doing in this location?\nHow many of them were here?\nWhen you encounter creatures you’ve tracked in this way, gain a +1 bonus to your Evasion against them.", "spells": []}, {"name": "Brace", "domain": "bone", "level": 3, "recallCost": 1, "type": "ability", "inVault": true, "text": "When you mark an Armor Slot to reduce incoming damage, you can mark a Stress to mark an additional Armor Slot.", "spells": []}], "features": [{"name": "Natural Climber", "text": "You have advantage on Agility Rolls that involve balancing and climbing.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}, {"name": "Nimble", "text": "Gain a permanent +1 bonus to your Evasion at character creation.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}, {"name": "Lightfoot", "text": "Your movement is naturally silent. You have advantage on rolls to move without being heard.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}, {"name": "Hold Them Off", "text": "Spend 3 Hope when you succeed on an attack with a weapon to use that same roll against two additional adversaries within range of the attack.", "costs": [{"key": "hope", "value": 3}], "hasRoll": false, "rollTrait": "", "uses": null, "passive": false}, {"name": "Ranger's Focus", "text": "Spend a Hope and make an attack against a target. On a success, deal your attack’s normal damage and temporarily make the attack’s target your Focus. Until this feature ends or you make a different creature your Focus, you gain the following benefits against your Focus: \n• You know precisely what direction they are in. \n\n• When you deal damage to them, they must mark a Stress. \n\n• When you fail an attack against them, you can end your Ranger’s Focus feature to reroll your Duality Dice.", "costs": [{"key": "hope", "value": 1}], "hasRoll": false, "rollTrait": "", "uses": null, "passive": false}, {"name": "Ruthless Predator", "text": "When you make a damage roll, you can mark a Stress to gain a +1 bonus to your Proficiency. Additionally, when you deal Severe damage to an adversary, they must mark a Stress.", "costs": [{"key": "stress", "value": 1}], "hasRoll": false, "rollTrait": "", "uses": null, "passive": false}, {"name": "Path Forward", "text": "When you’re traveling to a place you’ve previously visited or you carry an object that has been at the location before, you can identify the shortest, most direct path to your destination.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}, {"name": "Elusive Predator", "text": "When your Focus makes an attack against you, you gain a +2 bonus to your Evasion against the attack.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}, {"name": "Apex Predator", "text": "Before you make an attack roll against your Focus, you can spend a Hope. On a successful attack, you remove a Fear from the GM’s Fear pool.", "costs": [{"key": "hope", "value": 1}], "hasRoll": true, "rollTrait": "", "uses": null, "passive": false}, {"name": "Beastform", "text": "Mark a Stress to magically transform into a creature of your tier or lower from the Beastform list. You can drop out of this form at any time. While transformed, you can’t use weapons or cast spells from domain cards, but you can still use other features or abilities you have access to. Spells you cast before you transform stay active and last for their normal duration, and you can talk and communicate as normal. Additionally, you gain the Beastform’s features, add their Evasion bonus to your Evasion, and use the trait specified in their statistics for your attack. While you’re in a Beastform, your armor becomes part of your body and you mark Armor Slots as usual; when you drop out of a Beastform, those marked Armor Slots remain marked. If you mark your last Hit Point, you automatically drop out of this form.", "costs": [{"key": "stress", "value": 1}], "hasRoll": false, "rollTrait": "", "uses": null, "passive": false}, {"name": "Wildtouch", "text": "You can perform harmless, subtle effects that involve nature—such as causing a flower to rapidly grow, summoning a slight gust of wind, or starting a campfire— at will.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}, {"name": "Elemental Incarnation", "text": "Mark a Stress to Channel one of the following elements until you take Severe damage or until your next rest:\n• Fire: When an adversary within Melee range deals damage to you, they take 1d10 magic damage.\n\n• Earth: Gain a bonus to your damage thresholds equal to your Proficiency.\n\n• Water: When you deal damage to an adversary within Melee range, all other adversaries within Very Close range must mark a Stress. \n\n• Air: You can hover, gaining advantage on Agility Rolls.", "costs": [{"key": "stress", "value": 1}], "hasRoll": true, "rollTrait": "", "uses": null, "passive": false}, {"name": "Elemental Aura", "text": "Once per rest while Channeling, you can assume an aura matching your element. The aura affects targets within Close range until your Channeling ends.\n• Fire: When an adversary marks 1 or more Hit Points, they must also mark a Stress.\n\n• Earth: Your allies gain a +1 bonus to Strength.\n\n• Water: When an adversary deals damage to you, you can mark a Stress to move them anywhere within Very Close rang damage": "d4 phy"}, "features": [{"name": "Aquatic", "text": "You can breathe and move naturally underwater."}, {"name": "Fragile", "text": "When you take Major or greater damage, you drop out of Beastform."}]}, {"name": "Stalking Arachnid", "tier": 1, "examples": ["Tarantula", "Wolf Spider"], "evasionBonus": 2, "traitBonus": {"trait": "Finesse", "bonus": 1}, "attack": {"range": "Melee", "trait": "Finesse", "damage": "d6+1 phy"}, "features": [{"name": "Venomous Bite", "text": "When you succeed on an attack against a target within Melee range, the target becomes temporarily Poisoned. A Poisoned creature takes 1d10 direct physical damage each time they act."}, {"name": "Webslinger", "text": "You can create a strong web material useful for both adventuring and battle. The web is resilient enough to support one creature. You can temporarily Restrain a target within Close range by succeeding on a Finesse Roll against them."}]}, {"name": "Armored Sentry", "tier": 2, "examples": ["Armadillo", "Pangolin", "Turtle"], "evasionBonus": 1, "traitBonus": {"trait": "Strength", "bonus": 1}, "attack": {"range": "Melee", "trait": "Strength", "damage": "d8+2 phy"}, "features": [{"name": "Armored Shell", "text": "Your hardened exterior gives you resistance to physical damage. Additionally, mark an Armor Slot to retract into your shell. While in your shell, physical damage is reduced by a number equal to your Armor Score (after applying resistance), but you can’t perform other actions without leaving this form."}, {"name": "Cannonball", "text": "Mark a Stress to allow an ally to throw or launch you at an adversary. To do so, the ally makes an attack roll using Agility or Strength (their choice) against a target within Close range. On a success, the adversary takes d12+2 physical damage using the thrower’s Proficiency. You can spend a  Hope to target an additional adversary within Very Close range of the first. The second target takes half the damage dealt to the first target."}]}, {"nam ained and Vulnerable."}]}, {"name": "Great Winged Beast", "tier": 3, "examples": ["Giant Eagle", "Falcon"], "evasionBonus": 3, "traitBonus": {"trait": "Finesse", "bonus": 2}, "attack": {"range": "Melee", "trait": "Finesse", "damage": "d8+6 phy"}, "features": [{"name": "Bird’s-Eye View", "text": "You can fly at will. Once per rest while you are airborne, you can ask the GM a question about the scene below you without needing to roll. The first time a character makes a roll to act on this information, they gain advantage on the roll."}, {"name": "Carrier", "text": "You can carry up to two willing allies with you when you move."}]}, {"name": "Aquatic Predator", "tier": 3, "examples": ["Dolphin", "Orca", "Shark"], "evasionBonus": 4, "traitBonus": {"trait": "Agility", "bonus": 2}, "attack": {"range": "Melee", "trait": "Agility", "damage": "d10+6 phy"}, "features": [{"name": "Aquatic", "text": "You can breathe and move naturally underwater."}, {"name": "Vicious Maul", "text": "When you succeed on an attack against a target, you can spend a  Hope to make them Vulnerable and gain a +1 bonus to your Proficiency for this attack."}]}, {"name": "Legendary Beast", "tier": 3, "examples": ["Upgraded Tier 1 Options"], "evasionBonus": 0, "traitBonus": null, "attack": null, "features": [{"name": "Evolved", "text": "Pick a Tier 1 Beastform option and become a larger, more powerful version of that creature. While you’re in this form, you retain all traits and features from the original form and gain the following bonuses:\n\n• A +6 bonus to damage rolls\n\n• A +1 bonus to the trait used by this form\n\n• A +2 bonus to Evasion"}]}, {"name": "Legendary Hybrid", "tier": 3, "examples": ["Griffon", "Sphinx"], "evasionBonus": 3, "traitBonus": {"trait": "Strength", "bonus": 2}, "attack": {"range": "Melee", "trait": "Strength", "damage": "d10+8"}, "features": [{"name": "Hybrid Features", "text": "To transform into this creature, mark an additional Stress. Choose any two Beastform options from
