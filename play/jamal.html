n spend any number of these Slayer Dice, rolling them and adding their result to the roll. At the end of each session, clear any unspent Slayer Dice on this card and gain a Hope per die cleared.", "costs": [], "hasRoll": true, "rollTrait": "", "uses": null, "passive": true}, {"name": "Weapon Specialist", "text": "You can wield multiple weapons with dangerous ease. When you succeed on an attack, you can spend a Hope to add one of the damage dice from your secondary weapon to the damage roll. Additionally, once per long rest when you roll your Slayer Dice, reroll any 1s.", "costs": [{"key": "hope", "value": 1}], "hasRoll": false, "rollTrait": "", "uses": {"n": 1, "period": "long"}, "passive": false}, {"name": "Martial Preparation", "text": "You’re an inspirational warrior to all who travel with you. Your party gains access to the Martial Preparation downtime move. To use this move during a rest, describe how you instruct and train with your party. You and each ally who chooses this downtime move gain a d6 Slayer Die. A PC with a Slayer Die can spend it to roll the die and add the result to an attack or damage roll of their choice.", "costs": [], "hasRoll": false, "rollTrait": "", "uses": null, "passive": true}], "inventory": [{"name": "A Sharpening Stone", "kind": "loot", "qty": 1, "text": ""}, {"name": "Torch", "kind": "loot", "qty": 1, "text": ""}, {"name": "50ft of Rope", "kind": "loot", "qty": 1, "text": ""}, {"name": "Basic Supplies", "kind": "loot", "qty": 1, "text": ""}, {"name": "Demon Tiger Collar", "kind": "loot", "qty": 1, "text": ""}, {"name": "Borek's Amulet", "kind": "loot", "qty": 1, "text": "Borek's amulet resembles a large medallion. Given to Heyou to help protect him from the Askavere, he's eventually expecting this back."}, {"name": "Fire Jar", "kind": "loot", "qty": 1, "text": "You can pour out the strange liquid contents of this jar to instantly produce fire. The contents regenerate when you take a long rest."}, {"name": "Lorekeeper", "kind": "loo
