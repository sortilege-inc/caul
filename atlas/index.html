<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas of the World — Caul</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Pirata+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../umbra.css">
<style>
  html,body{height:100%;overflow:hidden}
  .atlas-shell{display:flex;height:calc(100vh - 47px);min-height:420px}
  .mapwrap{position:relative;flex:1;min-width:0;overflow:hidden;cursor:grab;
    background:radial-gradient(120% 120% at 50% 0%, #10151b, #070a0d 80%);
    border-right:1px solid var(--edge-soft)}
  .mapwrap.grabbing{cursor:grabbing}
  .viewport{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  .viewport img{display:block;width:1168px;height:auto;user-select:none;-webkit-user-drag:none;
    filter:invert(1) brightness(.86) contrast(1.08) sepia(.32) hue-rotate(175deg) saturate(.7);opacity:.92}
  /* map pins — colour/shape keyed to location kind */
  .marker{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:5}
  .pin{position:relative;width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:1.5px solid rgba(10,13,17,.9);box-shadow:0 3px 7px rgba(0,0,0,.6);transition:transform .15s, filter .15s}
  .pin::after{content:"";position:absolute;inset:5px;border-radius:50%;background:rgba(248,244,230,.7)}
  .marker:hover .pin,.marker.active .pin{filter:brightness(1.2)}
  .marker.active .pin{box-shadow:0 0 0 3px rgba(210,226,236,.55), 0 3px 9px rgba(0,0,0,.75)}
  .k-settlement .pin{background:radial-gradient(circle at 62% 28%, #ecd79a, var(--gilt) 66%, #6d5a2f)}
  .k-seat .pin{background:radial-gradient(circle at 62% 28%, #e0997f, #9a463d 64%, #56201a)}
  .k-delve .pin{background:radial-gradient(circle at 62% 28%, #bcaae8, #6d6f9a 64%, #383960)}
  .k-ruin .pin{background:radial-gradient(circle at 62% 28%, #566069, #262e37 66%, #0f141a);border-color:rgba(0,0,0,.95)}
  .k-ruin .pin::after{content:"✕";inset:0;background:none;border-radius:0;color:#cdd5da;font:700 11px/1 sans-serif;
    display:grid;place-items:center;transform:rotate(45deg)}
  .maplegend{position:absolute;left:14px;top:14px;z-index:20;background:rgba(11,15,20,.86);
    border:1px solid var(--edge);border-radius:3px;padding:10px 13px;display:flex;flex-direction:column;gap:7px;
    font-family:var(--caps);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--bone-2)}
  .maplegend .lg{display:flex;align-items:center;gap:9px}
  .maplegend .sw{width:11px;height:11px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:1px solid rgba(0,0,0,.8);flex:none}
  .maplegend .sw.k-settlement{background:var(--gilt)} .maplegend .sw.k-seat{background:#9a463d}
  .maplegend .sw.k-delve{background:#6d6f9a} .maplegend .sw.k-ruin{background:#2b333d}
  .mlabel{position:absolute;left:50%;bottom:calc(100% + 4px);transform:translateX(-50%);white-space:nowrap;
    font-family:var(--caps);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--bone);background:rgba(12,16,20,.82);padding:2px 7px;border:1px solid var(--edge-soft);
    border-radius:2px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .marker:hover .mlabel,.marker.active .mlabel,.labels-on .mlabel{opacity:1}
  .zoomctl{position:absolute;left:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:20}
  .zoomctl button{width:38px;height:38px;font-size:18px;font-family:var(--caps);cursor:pointer;color:var(--bone);
    border:1px solid var(--edge);border-radius:3px;background:rgba(22,28,36,.9);box-shadow:0 2px 6px rgba(0,0,0,.5);
    display:grid;place-items:center;line-height:1;transition:.12s}
  .zoomctl button:hover{background:var(--slate-3);border-color:var(--gilt-soft);color:var(--pewter-lit)}
  .maphint{position:absolute;right:14px;bottom:12px;font-family:var(--fell);font-style:italic;font-size:12px;
    color:var(--ash);background:rgba(12,16,20,.7);padding:4px 10px;border-radius:3px;z-index:20}
  .maptoggle{position:absolute;right:14px;top:14px;z-index:20;font-family:var(--caps);font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--bone);cursor:pointer;
    background:rgba(22,28,36,.9);border:1px solid var(--edge);border-radius:3px;padding:7px 11px}
  .maptoggle:hover{border-color:var(--gilt-soft);color:var(--pewter-lit)}
  .atlas-panel{width:380px;flex:none;display:flex;flex-direction:column;min-height:0;
    background:linear-gradient(180deg, rgba(28,36,46,.6), rgba(14,18,24,.75)), var(--slate)}
  .atabs{display:flex;border-bottom:1px solid var(--edge-soft)}
  .atab{flex:1;text-align:center;padding:13px 4px;cursor:pointer;font-family:var(--caps);font-size:11px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ash);border-bottom:2px solid transparent;transition:.12s}
  .atab:hover{color:var(--pewter)}
  .atab.active{color:var(--gilt);border-bottom-color:var(--gilt-soft)}
  .apbody{flex:1;overflow-y:auto;padding:22px 24px 40px}
  .apbody::-webkit-scrollbar{width:9px}
  .apbody::-webkit-scrollbar-thumb{background:var(--edge);border-radius:5px}
  .aempty{color:var(--ash);font-family:var(--fell);font-style:italic;text-align:center;margin-top:56px;line-height:1.7}
  .aempty .big{display:block;font-family:var(--black);font-size:44px;color:var(--gilt);margin-bottom:12px;font-style:normal}
  .dt-role{font-family:var(--caps);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gilt)}
  .dt-name{font-family:var(--black);font-size:30px;line-height:1.05;margin:4px 0 12px;color:var(--pewter)}
  .dt-blurb{font-size:15px;line-height:1.6;color:var(--bone);margin:0 0 18px}
  .dt-open{font-family:var(--caps);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--moon);
    text-decoration:none;border:1px solid var(--edge);padding:9px 14px;border-radius:3px;display:inline-block;transition:.15s}
  .dt-open:hover{border-color:var(--gilt-soft);color:var(--moon-lit);background:rgba(159,180,194,.06)}
  .dt-disabled{color:var(--ash-dim);border-color:var(--edge-soft);cursor:default}
  .dt-disabled:hover{background:none;color:var(--ash-dim);border-color:var(--edge-soft)}
  .gazrow{display:flex;align-items:center;gap:9px;padding:9px 4px;border-bottom:1px solid var(--edge-soft);
    cursor:pointer;color:var(--bone);text-decoration:none;transition:.12s}
  .gazrow:hover{background:rgba(179,154,99,.06);padding-left:8px}
  .gazrow .gmark{flex:none;width:16px;color:var(--gilt);font-size:12px;text-align:center}
  .gazrow .gnm{flex:1;font-size:15px}
  .gazrow .gopen{font-family:var(--caps);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash)}
  .apintro{font-family:var(--fell);font-style:italic;color:var(--ash);font-size:13px;line-height:1.6;margin:0 0 14px}
  @media (max-width:820px){
    .atlas-shell{flex-direction:column;height:auto;min-height:0;overflow:visible}
    .mapwrap{flex:none;height:60vh;min-height:320px;border-right:none;border-bottom:1px solid var(--edge-soft)}
    .atlas-panel{width:100%;height:auto}
    html,body{overflow:auto}
  }
</style>
</head>

</div>
<script>
const DATA = {"pins": [{"name": "Stoneheart Peaks", "xy": [89.7, 51.8], "kind": "ruin", "url": "stoneheart-peaks.html", "blurb": "Stoneheart Peaks Stoneheart Peaks is a rugged mountain range characterized by steep cliffs and rocky outcrops, situated above the tree line. The climate is harsh and cold, often marked by snow near the peaks. The area features a network of…"}, {"name": "Ulmira’s Step", "xy": [91.5, 65.0], "kind": "settlement", "url": "ulmiras-step.html", "blurb": "Ulmira’s Step Ulmira’s Step is a significant location within the mountains, distinguished by massive stone structures and broken palisades, with remnants of titanic faces emerging from the earth, indicating a long-lost civilization that…"}, {"name": "St. Thera’s Remit", "xy": [75.1, 64.5], "kind": "settlement", "url": "st-theras-remit.html", "blurb": "St. Thera’s Remit St. Thera’s Remit is a northwest monastery located in a mountainous region, near the ancient city of Amber Reach. It serves as a pilgrimage site and a center for knowledge, likely housing scholars and providing spiritual…"}, {"name": "Grithmaar Deep", "xy": [87.8, 72.6], "kind": "delve", "url": "grithmaar-deep.html", "blurb": "Grithmaar Deep Grithmaar Deep is a vast subterranean expanse beneath the mountains, associated with the dwarves and characterized by expansive caverns and a dark, foreboding environment. This long-abandoned trade concourse, once a bustling…"}, {"name": "Drosven’s Gate", "xy": [89.7, 75.4], "kind": "seat", "url": "drosvens-gate.html", "blurb": "Drosven’s Gate Drosven’s Gate is a settlement known for its central plaza, featuring a Sacred Pyre that serves as a focal point for the community. Surrounding the plaza are the Idol Hollows, where the ground is cracked and unstable. The…"}, {"name": "Dolm's Break", "xy": [73.1, 73.2], "kind": "settlement", "url": "dolms-break.html", "blurb": "Dolm's Break Dolm's Break is a mountain settlement noted for its cliff-hugging architecture, rope bridges, ladders, and carved dwellings. It serves as a connection point for travelers, with paths leading to Tern’s Watch, St. Thera’s Remit,…"}, {"name": "Verrow's Span", "xy": [77.5, 73.2], "kind": "settlement", "url": "verrows-span.html", "blurb": "Verrow's Span Verrow's Span is a cliff-hugging village nestled in a mountainous region, characterized by its unique architecture of dwellings carved from the rock formations. The settlement is predominantly inhabited by simiah, with a…"}, {"name": "Tern’s Watch", "xy": [82.2, 75.0], "kind": "settlement", "url": "terns-watch.html", "blurb": "Tern’s Watch Tern’s Watch is located in a mountainous region, marked by elevated terrain and significant landmarks. The area contains large pictographs embedded in the mountainside, standing 20 to 30 feet tall, arranged in sequences that…"}, {"name": "Larrow", "xy": [91.6, 78.3], "kind": "ruin", "url": "larrow.html", "blurb": "Larrow Larrow was once a bustling hub town, the crossroads that knit together the settlements of the region — Vireth Hollow to the southeast, Drosven’s Gate beyond it, and others along the roads it anchored. Then its pyre went out, and no…"}, {"name": "Vireth Hollow", "xy": [93.4, 80.5], "kind": "settlement", "url": "vireth-hollow.html", "blurb": "Vireth Hollow Vireth Hollow is a settlement in the wilds to the southeast of Drosven’s Gate, and the region Draz came from before the road brought him north. It is home to ribbits — the large frog-folk — to fungril, and to a scattering of…"}, {"name": "Kaelrock", "xy": [81.9, 80.9], "kind": "settlement", "url": null, "blurb": "A rocky upland settlement — simiah, humans and hill-giants."}, {"name": "Redmorrow", "xy": [88.9, 83.6], "kind": "settlement", "url": "redmorrow.html", "blurb": "Redmorrow Redmorrow is a coastal community grown up around a scatter of grounded shipwrecks, their hulls long since converted into homes, stalls, and hideaways — a black-market port where goods and people move without too many questions…"}, {"name": "Salthewn", "xy": [78.8, 85.4], "kind": "settlement", "url": "salthewn.html", "blurb": "Salthewn Salthewn is a coastal port town known for its rugged terrain and syndicate activities. It was the base of the syndicate Heyou once ran with, and its underworld ties run deep. (The giant brothers Ugg and Grug, whom Heyou knew from…"}, {"name": "Thistleglass", "xy": [84.2, 85.4], "kind": "settlement", "url": "thistleglass.html", "blurb": "Thistleglass Thistleglass is located west of Drosven’s Gate, known for its connection to sacred rituals and the natural world. It is a potential source for a Blessed Branch needed to rekindle the extinguished Sacred Pyre in Drosven’s Gate.…"}, {"name": "Mireveil", "xy": [72.8, 87.2], "kind": "settlement", "url": null, "blurb": "A mire-veiled settlement of galapa, ribbets and clanks."}], "gazetteer": [{"name": "Abandoned Southern Wing", "url": "abandoned-southern-wing.html", "pinned": false}, {"name": "Amber Reach", "url": "amber-reach.html", "pinned": false}, {"name": "Audience Hall", "url": "audience-hall.html", "pinned": false}, {"name": "Barn", "url": "barn.html", "pinned": false}, {"name": "Borek’s residence", "url": "boreks-residence.html", "pinned": false}, {"name": "Caranthalis Altar", "url": "caranthalis-altar.html", "pinned": false}, {"name": "Celsian Athenaeum", "url": "celsian-athenaeum.html", "pinned": false}, {"name": "Celsian Compound", "url": "celsian-compound.html", "pinned": false}, {"name": "crater lake", "url": "crater-lake.html", "pinned": false}, {"name": "dead world", "url": "dead-world.html", "pinned": false}, {"name": "Dolm's Break", "url": "dolms-break.html", "pinned": true}, {"name": "Drosven’s Gate", "url": "drosvens-gate.html", "pinned": true}, {"name": "Glowing Tree", "url": "glowing-tree.html", "pinned": false}, {"name": "Grand Hall", "url": "grand-hall.html", "pinned": false}, {"name": "Grithmaar Deep", "url": "grithmaar-deep.html", "pinned": true}, {"name": "Idol Hollows", "url": "idol-hollows.html", "pinned": false}, {"name": "Larrow", "url": "larrow.html", "pinned": true}, {"name": "luminous hole", "url": "luminous-hole.html", "pinned": false}, {"name": "Metal Cell", "url": "metal-cell.html", "pinned": false}, {"name": "Moon Rune Carving", "url": "moon-rune-carving.html", "pinned": false}, {"name": "Mountain Pass", "url": "mountain-pass.html", "pinned": false}, {"name": "Mountain Pictographs", "url": "mountain-pictographs.html", "pinned": false}, {"name": "Redmorrow", "url": "redmorrow.html", "pinned": true}, {"name": "Rough-Hewn Stone Tunnel", "url": "rough-hewn-stone-tunnel.html", "pinned": false}, {"name": "Sacred Pyre", "url": "sacred-pyre.html", "pinned": false}, {"name": "Sacred Tree", "url": "sacred-tree.html", "pinned": false}, {"name": "Salthewn", "url": "salthewn.html", "pinned": true}, {"name": "Scholar Statue Chamber", "url": "scholar-statue-chamber.html", "pinned": false}, {"name": "sheltered cleft", "url": "sheltered-cleft.html", "pinned": false}, {"name": "St. Thera’s Remit", "url": "st-theras-remit.html", "pinned": true}, {"name": "Stoneheart Peaks", "url": "stoneheart-peaks.html", "pinned": true}, {"name": "Tern’s Watch", "url": "terns-watch.html", "pinned": true}, {"name": "Thistleglass", "url": "thistleglass.html", "pinned": true}, {"name": "Titan-basin", "url": "titan-basin.html", "pinned": false}, {"name": "Tlellic’s Altar", "url": "tlellics-altar.html", "pinned": false}, {"name": "Ulmira’s Step", "url": "ulmiras-step.html", "pinned": true}, {"name": "Underground Complex", "url": "underground-complex.html", "pinned": false}, {"name": "Verrow's Span", "url": "verrows-span.html", "pinned": true}, {"name": "Vireth Hollow", "url": "vireth-hollow.html", "pinned": true}, {"name": "Witch’s Mountainside Camp", "url": "witchs-mountainside-camp.html", "pinned": false}, {"name": "World Above", "url": "world-above.html", "pinned": false}, {"name": "World Below", "url": "world-below.html", "pinned": false}, {"name": "Ygva’s Peak", "url": "ygvas-peak.html", "pinned": false}], "legend": [{"kind": "seat", "label": "The Company's seat"}, {"kind": "delve", "label": "Delve &amp; underworld"}, {"kind": "settlement", "label": "Settlement"}, {"kind": "ruin", "label": "Ruin &amp; lost place"}], "focus": [68.9, 49.1, 94.9, 94.5]};
const PINS = {}; DATA.pins.forEach(p=>PINS[p.name]=p);
const wrap=document.getElementById('mapwrap'), vp=document.getElementById('viewport'), img=document.getElementById('mapimg');
let scale=1, tx=0, ty=0, baseW=1168, baseH=0;
function applyT(){vp.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}
function clamp(){const ww=wrap.clientWidth,wh=wrap.clientHeight,cw=baseW*scale,ch=baseH*scale;
  if(cw<=ww)tx=(ww-cw)/2;else tx=Math.min(0,Math.max(ww-cw,tx));
  if(ch<=wh)ty=(wh-ch)/2;else ty=Math.min(0,Math.max(wh-ch,ty));}
function fit(){const ww=wrap.clientWidth,wh=wrap.clientHeight,s=Math.min(ww/baseW,wh/baseH);
  scale=s;tx=(ww-baseW*scale)/2;ty=(wh-baseH*scale)/2;applyT();}
function fitFocus(){const f=DATA.focus;if(!f){fit();return;}
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  const rx=f[0]/100*baseW, ry=f[1]/100*baseH, rw=(f[2]-f[0])/100*baseW, rh=(f[3]-f[1])/100*baseH;
  scale=Math.min(ww/rw,wh/rh)*0.94;
  tx=ww/2-(rx+rw/2)*scale; ty=wh/2-(ry+rh/2)*scale; clamp(); applyT();}
function zoomAt(cx,cy,f){const ns=Math.min(6,Math.max(0.4,scale*f)),r=ns/scale;
  tx=cx-(cx-tx)*r;ty=cy-(cy-ty)*r;scale=ns;clamp();applyT();}
function ready(){baseH=baseW*(img.naturalHeight/img.naturalWidth);buildMarkers();fitFocus();}
img.addEventListener('load',ready); if(img.complete&&img.naturalWidth)ready();
wrap.addEventListener('wheel',e=>{e.preventDefault();const r=wrap.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.18:1/1.18);},{passive:false});
let drag=false,sx,sy;
wrap.addEventListener('pointerdown',e=>{if(e.target.closest('.marker'))return;drag=true;sx=e.clientX;sy=e.clientY;
  wrap.classList.add('grabbing');wrap.setPointerCapture(e.pointerId);});
wrap.addEventListener('pointermove',e=>{if(!drag)return;tx+=e.clientX-sx;ty+=e.clientY-sy;sx=e.clientX;sy=e.clientY;clamp();applyT();});
wrap.addEventListener('pointerup',()=>{drag=false;wrap.classList.remove('grabbing');});
document.getElementById('zin').onclick=()=>zoomAt(wrap.clientWidth/2,wrap.clientHeight/2,1.3);
document.getElementById('zout').onclick=()=>zoomAt(wrap.clientWidth/2,wrap.clientHeight/2,1/1.3);
document.getElementById('zreset').onclick=fitFocus;
window.addEventListener('resize',()=>{clamp();applyT();});
const KL={}; (DATA.legend||[]).forEach(l=>KL[l.kind]=l.label);
let activeName=null;
function buildMarkers(){const host=document.getElementById('markers');host.innerHTML='';
  DATA.pins.forEach(p=>{const[px,py]=p.xy;const m=document.createElement('div');
    m.className='marker k-'+(p.kind||'settlement');m.dataset.name=p.name;
    m.style.left=(px/100*baseW)+'px';m.style.top=(py/100*baseH)+'px';
    m.innerHTML=`<div class="pin"></div><div class="mlabel">${p.name}</div>`;
    m.addEventListener('click',ev=>{ev.stopPropagation();select(p.name);});host.appendChild(m);});}
function buildLegend(){const el=document.getElementById('maplegend');if(!el)return;
  el.innerHTML=(DATA.legend||[]).map(l=>`<div class="lg"><span class="sw k-${l.kind}"></span>${l.label}</div>`).join('');}
buildLegend();
function focusMarker(name){const p=PINS[name];if(!p)return;const[px,py]=p.xy;
  if(scale<1.5)scale=1.8;const wx=px/100*baseW*scale,wy=py/100*baseH*scale;
  tx=wrap.clientWidth/2-wx;ty=wrap.clientHeight*0.46-wy;clamp();applyT();}
const apbody=document.getElementById('apbody');let tab='detail';
document.querySelectorAll('.atab').forEach(t=>t.onclick=()=>{tab=t.dataset.tab;
  document.querySelectorAll('.atab').forEach(x=>x.classList.toggle('active',x===t));render();});
function select(name){activeName=name;tab='detail';
  document.querySelectorAll('.marker').forEach(m=>m.classList.toggle('active',m.dataset.name===name));
  document.querySelectorAll('.atab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='detail'));
  render();focusMarker(name);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function render(){
  if(tab==='gaz'){
    let h='<p class="apintro">Every waypoint the company has walked. ◆ marks those set on the map — select one to find it.</p>';
    DATA.gazetteer.forEach(g=>{h+=`<a class="gazrow" href="${g.url}" data-name="${esc(g.name)}" data-pinned="${g.pinned?1:0}">
      <span class="gmark">${g.pinned?'◆':''}</span><span class="gnm">${esc(g.name)}</span><span class="gopen">entry ›</span></a>`;});
    apbody.innerHTML=h;
    apbody.querySelectorAll('.gazrow').forEach(el=>el.onclick=ev=>{
      if(el.dataset.pinned==='1'){ev.preventDefault();select(el.dataset.name);}});
    apbody.scrollTop=0;return;
  }
  if(!activeName){apbody.innerHTML=`<div class="aempty"><span class="big">✶</span>
    Choose a waypoint on the map to read where it sits in the tale.<br><br>Or open the <b>Gazetteer</b> for every location.</div>`;return;}
  const p=PINS[activeName];
  const role=KL[p.kind]||'Waypoint';
  const link=p.url?`<a class="dt-open" href="${p.url}">Open full entry ›</a>`
                  :`<span class="dt-open dt-disabled">Not yet chronicled</span>`;
  apbody.innerHTML=`<div class="dt-role">${role}</div><div class="dt-name">${esc(p.name)}</div>
    <p class="dt-blurb">${esc(p.blurb)}</p>${link}`;
  apbody.scrollTop=0;
}
let labelsOn=false;
document.getElementById('labelToggle').onclick=function(){labelsOn=!labelsOn;
  document.getElementById('markers').classList.toggle('labels-on',labelsOn);
  this.textContent='Labels: '+(labelsOn?'On':'Off');};
render();
</script>
</body>
